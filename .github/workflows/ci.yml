name: CI

on:
  push:
    branches: [develop, "sprint-*"]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install ruff black

      - name: ruff lint
        run: ruff check .

      - name: black check
        run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aimarketing_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: aimarketing_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      ANTHROPIC_API_KEY: dummy
      TELEGRAM_BOT_TOKEN: dummy
      TELEGRAM_ADMIN_CHAT_ID: "0"
      N8N_WEBHOOK_URL: http://localhost:5678
      N8N_API_KEY: dummy
      OPENCLAW_PORT: "3000"
      MONTHLY_ADS_BUDGET_LIMIT_RUB: "100000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --asyncio-mode=auto --tb=short
