[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '\.claude/'

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".claude"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "PIE", "T20", "RET", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["app", "agents", "integrations"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
